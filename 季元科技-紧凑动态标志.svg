<?xml version="1.0" encoding="UTF-8"?>
<svg class="logo-svg" viewBox="0 0 240 240" role="img" aria-label="季元科技紧凑动态标志" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="compactGradient" x1="44" y1="34" x2="196" y2="204" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#79f2d7"></stop>
                <stop offset="0.56" stop-color="#31d9c2"></stop>
                <stop offset="1" stop-color="#d7dc58"></stop>
              </linearGradient>
              <radialGradient id="compactGlow" cx="50%" cy="50%" r="58%">
                <stop offset="0" stop-color="#d9fff5" stop-opacity="0.95"></stop>
                <stop offset="0.44" stop-color="#31d9c2" stop-opacity="0.68"></stop>
                <stop offset="1" stop-color="#31d9c2" stop-opacity="0"></stop>
              </radialGradient>
              <filter id="compactSoftGlow" x="-40%" y="-40%" width="180%" height="180%">
                <feGaussianBlur stdDeviation="3.2" result="blur"></feGaussianBlur>
                <feMerge>
                  <feMergeNode in="blur"></feMergeNode>
                  <feMergeNode in="SourceGraphic"></feMergeNode>
                </feMerge>
              </filter>
            </defs>
            <style>
              .compact-ring { stroke-dasharray: 126 36; animation: compact-ring 5.8s linear infinite; }
              .compact-phase { transform-origin: 120px 120px; animation: compact-phase 4.8s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
              .compact-phase.two { animation-delay: -1.2s; }
              .compact-phase.three { animation-delay: -2.4s; }
              .compact-phase.four { animation-delay: -3.6s; }
              .compact-core { transform-origin: 120px 120px; animation: compact-core 2.8s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
              @keyframes compact-ring { to { stroke-dashoffset: -324; } }
              @keyframes compact-phase {
                0%, 100% { opacity: 0.58; transform: scale(0.96); }
                50% { opacity: 1; transform: scale(1.035); }
              }
              @keyframes compact-core {
                0%, 100% { opacity: 0.9; transform: scale(1); }
                50% { opacity: 1; transform: scale(1.06); }
              }
            </style>

            <rect x="45" y="45" width="150" height="150" rx="34" fill="none" stroke="#d9fff5" stroke-opacity="0.18" stroke-width="1.5"></rect>
            <circle cx="120" cy="120" r="72" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="4"></circle>
            <circle class="compact-ring" cx="120" cy="120" r="74" fill="none" stroke="url(#compactGradient)" stroke-width="9" stroke-linecap="round" filter="url(#compactSoftGlow)"></circle>

            <g fill="none" stroke="url(#compactGradient)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
              <path class="compact-phase" d="M120 63 C142 72 153 86 155 106"></path>
              <path class="compact-phase two" d="M177 120 C168 142 154 153 134 155"></path>
              <path class="compact-phase three" d="M120 177 C98 168 87 154 85 134"></path>
              <path class="compact-phase four" d="M63 120 C72 98 86 87 106 85"></path>
            </g>

            <g class="compact-core" filter="url(#compactSoftGlow)">
              <circle cx="120" cy="120" r="35" fill="url(#compactGlow)"></circle>
              <rect x="96" y="96" width="48" height="48" rx="11" fill="none" stroke="url(#compactGradient)" stroke-width="6.5"></rect>
              <path d="M106 110 H134 M111 121 H129 M120 121 V130 M109 137 C115 129 125 129 131 137" fill="none" stroke="#d9fff5" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"></path>
            </g>
          </svg>